name: Em-dash check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if em-dash found
        run: |
          if grep -r $'\xe2\x80\x94' --include="*.md" --include="*.ipynb" --include="*.py" --include="*.js" --include="*.yaml" --include="*.json" .; then
            echo "ERROR: Em-dash found. Use a single hyphen (-) instead."
            exit 1
          fi
          echo "OK: No em-dashes found."
